<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axtarget 3D Pro - Full Text & Heartbeat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-layer">
        <h1 class="text-3xl font-black mb-2 tracking-tighter text-white main-title">m1_code <span class="text-pink-500">PRO</span></h1>
        <div class="status-badge">
            <span id="gesture-status" class="font-mono text-white text-lg uppercase tracking-widest">Iniciando...</span>
        </div>
    </div>

    <video id="input_video" autoplay playsinline></video>

    <script id="vertexShader" type="x-shader/x-vertex">
        attribute vec3 color;
        varying vec3 vColor;
        void main() {
            vColor = color;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = 40.0 * (1.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor;
        void main() {
            float d = distance(gl_PointCoord, vec2(0.5, 0.5));
            if (d > 0.5) discard;
            float glow = pow(1.0 - d * 2.0, 3.0);
            float core = pow(1.0 - d * 2.0, 10.0);
            gl_FragColor = vec4(mix(vColor, vec3(1.0), core), glow);
        }
    </script>

    <script src="script.js"></script>
</body>
</html>
